<!DOCTYPE html>
<html>
    <head>
        <title>Variables inside Functions in JavaScript</title>
    </head>
    <body>
      <h2>Variables inside Functions</h2>
    <button onclick="myfunction()">Click Me!</button>
        <p id="id1"></p>
        <p id="id2"></p>
        <script>
            var a=2
            function myfunction(){
                var b=5
                document.getElementById("id1").innerHTML=a
                document.getElementById("id2").innerHTML=b
            }
                        
        </script>
    </body>
</html>
