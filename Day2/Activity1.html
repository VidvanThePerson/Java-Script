<!DOCTYPE html>
<html>
    <head>
        <title>Functions in JavaScript</title>
    </head>
    <body>
      <button onclick="add()">Click!</button>
      <script>
        function add(x,y){
            if(y==undefined){
                y=2
            }
            if(x==undefined){
                x=4
            }
            document.write(x+y)
        }
      </script>
    </body>
</html>
