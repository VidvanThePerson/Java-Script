<!DOCTYPE html>
<html>
    <head>
        <title>Javascript Statements</title>
    </head>
    <body>
        <h1>Javascript Statements</h1>
        <h2 id="id1"></h2>
        <h2 id="id2"></h2>
        <script>
            a=10
            b=20
            document.getElementById("id1").innerHTML=a+b
            document.getElementById("id2").innerHTML=a**b
        </script>
        
    </body>
</html>
