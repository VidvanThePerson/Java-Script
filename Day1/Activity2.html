<!DOCTYPE html>
<html>
    <head>
        <title>Variables in Java Script (.js)</title>
    </head>
    <body>
       <h1>Java Script Variables</h1>       
       <p id="result"></p>
       <script>
        x=10
        y=20
        z=x+y
        document.getElementById("result").innerHTML=z
       </script>
    </body>
</html>
