<!DOCTYPE html>
<html>
    <head>
        <title>Operators in JavaScript (.js)</title>
    </head>
    <body>
        <h1>Operators in Javascript</h1>
        <h2 id="id1"></h2>
        <h2 id="id2"></h2>
        <h2 id="id3"></h2>
        <h2 id="id4"></h2>
        <h2 id="id5"></h2>
        <h2 id="id6"></h2>
        <script>
            document.getElementById("id1").innerHTML="+ (Add or Addition), it adds 2 or more numbers"
            document.getElementById("id2").innerHTML="- (Minus or Substract) it substracts 2 or more numbers"
            document.getElementById("id3").innerHTML="% (Modulos) instead of giving the quotient like in division, it gives you the remainder"
            document.getElementById("id4").innerHTML="// (Flow Division or Floor) it doesnt give decimals"
            document.getElementById("id5").innerHTML="/ (Divide) divides 2 or more numbers "
            document.getElementById("id1").innerHTML="^ (To the power of or power) multiplies the number by itself a specific amount of times"
        </script>
    </body>
</html>
