<!DOCTYPE html>
<html>
    <body>
     <h1>Javascript Objects and It's Properties</h1>
      <p>There are 2 different ways to access an object property</p>
      <p>You can use .property or ["property"].</p>
      <p id="Demo"></p>
      <script>
        var Student = {
            firstName: "Ochrestra",
            age:14,
            Grades:80
        };
        document.getElementById("Demo").innerHTML=Student.firstName+" is "+ Student.age+" years old."+" and his average is "+ Student.Grades+" out of 100!";
      </script>  
    </body>
</html>
